<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>북쪽의 푸바오</title>
    <link rel="stylesheet" href="Code/Style.css">
</head>
<body>
    <div id="world" class="world"></div>
    <div class="taketree" id="taketree"></div>
    <button class="iftaketreebutton" id="iftaketreebutton" type="button">taketree1</button>
    <div class="taketree_second" id="taketree_second"></div>
    <button class="iftaketreebutton_second" id="iftaketreebutton_second" type="button">taketree2</button>
    <button class="StartButton" id="Starter" type="button">start</button>
    <button class="credits" id="credits" type="button">credits</button>
    <button class="popki" id="popki" type="button"></button>
    <img src="Image/__egg__.png" class="egg" id="egg"></img>
    <button class="money" id="money"></button>
    <button class="tree_num" id="tree_num"></button>
    <button class="rock_num" id="rock_num"></button>
    <div class="alert" id="alert">Tutorial?</div>
    <button class="yes" id="yes" type="button">yes</button>
    <button class="no" id="no" type="button">no</button>
    <span id="span" style="position: absolute; top: 0vh; left: 0vw; color: white; font-size: 10vh;"></span>
    <script src="Code/Script.js" id="script"></script>
</body>
</html>
